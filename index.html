<style>
        :root {
            --splat-yellow: #e6ff00; /* 调高亮度的荧光黄绿 */
            --splat-purple: #7a1aff; /* 更有活力的霓虹紫 */
            --text-color: #3b2063;   /* 🍇 核心修改：正文换成深浆果紫，既能看清，又比死黑/黑青色高级、多巴胺 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: var(--text-color);
            overflow-x: hidden;
        }

        /* --- 动态颜料流动 Canvas 背景 --- */
        #inkCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
        }

        .vignette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 调整暗角颜色，融入一点霓虹紫，让整体不发暗 */
            background: radial-gradient(circle, transparent 40%, rgba(122, 26, 255, 0.3) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* 漂浮粒子样式 */
        .particle {
            position: fixed;
            bottom: -50px;
            font-size: 32px;
            pointer-events: none;
            z-index: 9999;
            user-select: none;
            opacity: 0;
            animation: floatUpAnimation 7s linear forwards;
        }

        @keyframes floatUpAnimation {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% {
                transform: translateY(-115vh) translateX(60px) rotate(360deg);
                opacity: 0;
            }
        }

        /* 画册最大高度限制 */
        .slider-container {
            width: 100%;
            max-width: 600px; 
            height: 400px; 
            margin: 0 auto;
            position: relative;
            border-bottom: 4px dashed var(--splat-yellow);
            background: rgba(122, 26, 255, 0.15); /* 顶部背景稍微透光 */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 16px 16px 0 0; 
            z-index: 2;
            box-shadow: 0 10px 20px rgba(230, 255, 0, 0.2);
            overflow: hidden;
        }

        @media (max-width: 600px) {
            .slider-container {
                height: 300px; 
            }
        }

        .slider {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .slider img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.3s ease-in-out; 
        }

        .slider img.active {
            opacity: 1;
        }

        /* --- 💌 信件主体内容（清透薄荷绿底色） --- */
        .letter-content {
            position: relative;
            z-index: 1;
            padding: 30px 20px;
            max-width: 600px;
            margin: 20px auto; 
            line-height: 1.9;
            font-size: 16px;
            letter-spacing: 1px;
            
            /* 🟢 保持明亮、清透的高饱和薄荷绿玻璃质感 */
            background: rgba(165, 255, 230, 0.75); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.5); /* 亮白色边框增加剔透感 */
            box-shadow: 0 15px 35px rgba(122, 26, 255, 0.15); /* 柔和的紫色阴影 */
        }

        /* 👑 称呼颜色 */
        .salutation {
            font-size: 20px;
            font-weight: bold;
            color: #5200cc; /* 霓虹深紫，跟薄荷绿是绝配对色 */
            margin-bottom: 25px;
            border-left: 4px solid var(--splat-yellow);
            padding-left: 10px;
        }

        /* 📄 正文部分（去掉之前沉重的黑色描边，改为轻盈的浅色柔和投影，保证字迹绝不发暗） */
        .paragraph {
            margin-bottom: 22px;
            text-align: justify;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
            text-shadow: 1px 1px 1px rgba(255, 255, 255, 0.6); 
        }

        .paragraph.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* 🌟 多巴胺高亮色（亮丽的蜜桃粉红/亮橘，专门用来划重点） */
        .highlight-yellow {
            color: #ff1a75; 
            font-weight: bold;
            background: rgba(255, 255, 255, 0.4);
            padding: 0 4px;
            border-radius: 4px;
        }

        /* ✍️ 右下角落款（偏紫色系） */
        .signature {
            text-align: right;
            margin-top: 45px;
            font-size: 14px;
            color: #8a4fff; /* 🦄 亮丽的香芋紫/薰衣草紫 */
            font-weight: 500;
            text-shadow: 1px 1px 0px rgba(255, 255, 255, 0.8);
        }

        /* --- 底部彩蛋按钮 --- */
        .nice-btn-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 30px 0 60px 0;
        }

        .nice-btn {
            background: var(--splat-purple);
            color: var(--splat-yellow);
            border: 3px solid var(--splat-yellow);
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(122, 26, 255, 0.4);
            transition: transform 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .nice-btn:active {
            transform: scale(0.95);
        }

        .nice-pop {
            position: fixed;
            color: #ff1a75; /* 赞气弹也换成明亮的多巴胺粉色 */
            font-weight: bold;
            font-size: 24px;
            z-index: 99999;
            pointer-events: none;
            text-shadow: 2px 2px 0px #fff;
            animation: popOut 0.8s ease-out forwards;
        }

        @keyframes popOut {
            0% {
                transform: scale(0.5) translate(0, 0);
                opacity: 1;
            }
            100% {
                transform: scale(1.6) translate(var(--mx), var(--my));
                opacity: 0;
            }
        }
    </style>
